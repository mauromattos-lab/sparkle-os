concerns:
  - id: hl-onboarding-01-flakiness
    severity: medium
    category: testing
    description: |
      LLM GPT-4.1 ocasionalmente (~20-33% das execuções do smoke
      automatizado) escreve promessa de handoff no texto ("Vou acionar
      a equipe...") mas não invoca efetivamente a função escalarHumano.
      No REPL manual validado por Mauro em 2 cenários (JBL preço + iPhone
      12 compra), ambos invocaram a tool corretamente. Execução final
      do smoke deste gate: 7/7 PASS.
    impact_in_production: |
      Em prod, se o bot escrever "vou escalar" mas não invocar a tool,
      a label `agente-off` não é adicionada ao Chatwoot → bot continua
      ativo → cliente pode continuar conversando achando que humano foi
      notificado. Mitigação imediata: Mauro monitora primeiras 2h via
      logs PM2 + Hiago já avisado de que início pode precisar ajustes.
    root_cause: |
      Padrão de LLM: quando o prompt tem exemplo de mensagem parecido
      com o que a tool produz, o modelo pode "absorver" tudo no texto
      em vez de separar texto do usuário + chamada de função. Prompt
      v4.3 reforçou a regra com checklist binário, mas não eliminou 100%
      a variância natural do modelo.
    recommendation: |
      Não bloqueia cutover (Hiago ciente, baseline equivalente a Julia/
      PLAKA/Scar). Criar story em Epic 17 Wave A: "Guard em software
      no webhook.ts — detectar promessa de handoff no texto sem invocação
      de escalarHumano e forçar chamada programaticamente". Fix aplicável
      a TODOS os tenants (resolveria variância residual em PLAKA, Fun,
      Scar também, não só HL). Prioridade P1 pós-cutover.
    accepted_by: '@qa (Quinn) — documentado e transferido pra backlog Epic 17'
    waiver_for_cutover: true
    waiver_rationale: |
      (1) Hiago cliente informado e consente com ajustes iniciais.
      (2) Equivalente ao baseline atual de outros tenants em produção.
      (3) Rollback em 1min documentado no runbook.
      (4) Mauro monitora primeiras 2h ativamente.
      (5) Gap tem fix identificado e story planejada (Epic 17 Wave A).

  - id: hl-onboarding-01-observability
    severity: low
    category: observability
    description: |
      Não há dashboard dedicado para monitorar a saúde do tenant HL
      pós-cutover — observação será manual via `pm2 logs zenya-webhook`
      e via Chatwoot UI.
    recommendation: |
      Pós-cutover, avaliar se vale adicionar dashboard (Grafana ou
      equivalente) com métricas por tenant. Trabalho de infra, fora
      do escopo desta story.
    accepted_by: '@qa (Quinn)'

