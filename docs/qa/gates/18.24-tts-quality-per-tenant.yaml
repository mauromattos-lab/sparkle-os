  - name: performance
    severity: medium
    verdict: PASS
    notes: |
      Impacto medido na codebase: ZERO. Resolve `resolveTtsConfig` é O(1), helper síncrono
      sem await. Body do POST cresceu ~30 bytes (campo `style`, `speed`, `use_speaker_boost`
