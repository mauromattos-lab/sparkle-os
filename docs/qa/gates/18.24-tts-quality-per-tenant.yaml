checks:
  - name: code_review
    severity: low
    verdict: PASS
    notes: |
      Padrões idiomáticos e cirúrgicos:
      - Tipos exportados (`TtsConfig`, `TtsVoiceSettings`) com JSDoc detalhado em cada
        campo explicando range, semântica e default. Ótima rastreabilidade.
      - Helper `resolveTtsConfig` extraído com escopo focado — recebe param + tenantConfig,
        retorna shape resolvido com voice_id garantido (throw se ausente). Isolamento
        da lógica de cascade facilita teste.
      - Cascade documentada em JSDoc do `generateAudio`: "tenantTtsConfig > voiceIdParam
        > ELEVENLABS_VOICE_ID env". Cobertura unit explícita do priority.
      - Defaults novos (`DEFAULT_MODEL_ID`, `DEFAULT_VOICE_SETTINGS`) com tipo
        `Required<TtsVoiceSettings>` — garante que nenhum campo fica undefined no resolved.
      - Deep merge campo-a-campo (não Object.assign / spread shallow) — preserva semântica
        de "missing field falls through to default" sem ambiguidade.
      - Comentários "Story 18.24" em cada bloco novo facilitam arqueologia.
      - `config-loader.ts` parse JSONB defensivo: `typeof === 'object' && !Array.isArray`
        evita corromper se DB retornar shape inesperado. Spread condicional `...(tts_config
        ? { tts_config } : {})` respeita exactOptionalPropertyTypes.
      - `agent/index.ts` mudança mínima (1 linha funcional) — só passa `config.tts_config`
        adicional. Sem refactor desnecessário.
      Sem code smells. Sem dead code. Naming consistente em todos os arquivos.

  - name: unit_tests
    severity: low
    verdict: PASS
    notes: |
      6 testes novos no sub-describe "Story 18.24 (per-tenant tts_config)":
      - Cenário 1 (defaults globais sem ttsConfig): valida URL contém voice env + body tem
        eleven_multilingual_v2 + voice_settings completo {0.40, 0.65, 0.40, 1.0, true}.
      - Cenário 2 (ttsConfig parcial só voice_id): URL pega custom-voice-X, voice_settings
        permanece com defaults novos.
      - Cenário 3 (ttsConfig completo Roberta): valida exatamente os settings curados pra
        Scar (0.35, 0.75, 0.30, 1.10, true) — uso de toEqual garante shape preciso.
      - Cenário 4 (tts_config undefined): explicitamente passa undefined → equivalente
        ao Cenário 1. Cobre o caso de tenant sem `tts_config` no DB (Prime, PLAKA, etc.).
      - Edge: voice_id resolution priority — confirma cascade tenant > param > env via 2
        chamadas back-to-back.
      - Edge: voice_settings partial override (só stability custom) — outros campos
        permanecem nos defaults. Garante deep merge field-a-field.

      Helpers `lastFetchBody()` e `lastFetchUrl()` extraídos pra reuso — DRY no test.
      Mocks reusam pattern existente do arquivo (mockFetch + vi.stubGlobal). Asserções
      específicas (toEqual com objetos completos) verificam shape exato, não só presença.

