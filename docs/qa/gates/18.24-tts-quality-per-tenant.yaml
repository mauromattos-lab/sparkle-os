      - Sensitive data exposure: ✅ tts_config nunca logado (só tipo verificado em
        rowToConfig). Não há leak de voice_id em error path comum.
      - Broken access control: ✅ migração não muda RLS. tts_config segue mesma policy
        que outros campos de zenya_tenants (service_role bypass; cliente sem acesso direto).
      - Security misconfiguration: ✅ defaults novos não diminuem segurança (TTS é
