    severity: low
    verdict: PASS
    notes: |
      OWASP basics check (8-point):
      - Injection: ✅ tts_config lido do DB como JSONB (typed, não eval/SQL string).
        Campos entram em URL query (voice_id) e body JSON (model_id, voice_settings) —
