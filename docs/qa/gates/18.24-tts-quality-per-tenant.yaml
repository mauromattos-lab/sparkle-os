waivers:
  - check: smoke_real_pos_deploy
    reason: |
      Step 4 do pattern operacional canônico do Epic 18 (6 steps) — smoke real só pode
      rodar após @devops Gage fazer push + deploy VPS. Cobertura unit dos 6 cenários
      cobre o comportamento programático. Smoke real validará tom em produção.
    severity: medium
    follow_up: |
      @devops Gage:
      1. Push da branch feat/18.24-tts-quality-per-tenant
      2. PR + squash-merge em main
      3. SSH VPS → git pull → npm install → npm run build → pm2 reload zenya-webhook
      4. Smoke real comparativo:
         a) Aguardar config-loader cache TTL expirar (5min) ou forçar reload
         b) Mandar mensagem WhatsApp pra Scar pedindo resposta-áudio (test mode admin)
         c) Ouvir áudio response com voice Roberta — comparar A/B com áudio antigo
            do Gustavo 2026-04-26 14:46:45 (.ogg)
         d) Validar: (i) voz Roberta confirmada (não a default ELEVENLABS_VOICE_ID),
            (ii) maior expressão emocional, (iii) comprimento ≤30s
      5. Validar com Gustavo direto pelo WhatsApp ("tá natural agora?")
      6. Se Gustavo aprovar → sign-off Mauro → status story Done.
      7. Se NÃO aprovar (ex: Roberta soa esquisita em PT-BR) → pivotar voice_id pra
         alternativa (Keren, Zenya2 ou outra) via UPDATE direto. Não precisa código novo.

  - check: monitor_48h_sem_regressao
    reason: |
      Step 5 do pattern Epic 18 — gate temporal pós-deploy. Métricas a observar
      sem regressão TTS cross-tenant:
      - pm2 logs zenya-webhook | grep -i 'ElevenLabs API error' deve permanecer 0/dia
      - Latência média TTS ≤3s end-to-end (request webhook → sendAudioMessage)
      - Tenants sem tts_config (Prime, PLAKA, Doceria, Fun, HL) respondem com áudio
        sem erro (defaults globais multilingual_v2 funcionam universalmente)
    severity: low
    follow_up: |
      @devops monitora 48h. Se latência exceder, abrir story de cache TTS (Wave 3 idea).

