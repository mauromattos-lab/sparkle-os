extended_checks:

  nfr_assessment:
    verdict: PASS
    security:
      authentication_authorization: "Backend usa service key (intencional bypass RLS); WHERE filtra por (tenant_id + phone_number) — sem cross-tenant leak"
      data_integrity: "DELETE atômico em Postgres; INSERT ON CONFLICT garante mutex final"
      sensitive_data_exposure: "Nenhuma — tenant_id/phone_number são keys operacionais, não secrets"
      input_validation: "tenantId e phone vêm de webhook validado em validatePayload (webhook.ts:64)"
    performance:
      latency_added: "+1 query SQL por acquire — Supabase REST + index hit (PK) ~3-8ms típico"
      throughput_impact: "Trivial — acquire é caminho RARO (1ª msg de sessão sem lock vivo); maioria dos webhooks não passa pelo acquire"
      scalability: "DELETE escala O(1) via PK index (tenant_id, phone_number); cleanup em sessão fria não impede sessão quente"
    reliability:
      crash_recovery: "Resolve EXATAMENTE o problema do crash entre acquire e release no finally. Pre-acquire cleanup garante recuperação automática"
      idempotency: "DELETE seguro pra rodar múltiplas vezes (zero linhas se nada órfão)"
      race_conditions: "DELETE...WHERE atômico em Postgres; INSERT ON CONFLICT cobre concurrent acquires (1 ganha, outros recebem 23505 — comportamento esperado)"

  risk_profile:
    verdict: PASS
    matrix:
      - risk: "Cleanup deleta lock vivo por engano"
        probability: "Baixa (5%)"
        impact: "Alto"
        mitigation: "DELETE só atua em locks com locked_at < NOW - TTL; locks vivos são atomicamente preservados"
      - risk: "Race condition entre 2 acquires concorrentes"
        probability: "Média (15%)"
        impact: "Médio"
        mitigation: "INSERT ON CONFLICT — 1 sucede, outros recebem false (comportamento esperado, NÃO bug)"
      - risk: "TTL muito baixo causa cleanup prematuro"
        probability: "Média (10%)"
        impact: "Médio"
        mitigation: "TTL 5min default — webhook agent tipicamente termina em <30s; envelope generoso"
      - risk: "TTL muito alto causa órfão persistir"
        probability: "Baixa (5%)"
        impact: "Baixo"
        mitigation: "Pior caso = 5min de espera; próximo acquire faz cleanup automaticamente"
      - risk: "Crash durante DELETE deixa órfão"
        probability: "Muito baixa (<1%)"
        impact: "Médio"
        mitigation: "Auto-recovery: próximo acquire roda cleanup novamente"
      - risk: "Postgres index não hit no DELETE"
        probability: "Muito baixa"
        impact: "Médio"
        mitigation: "PK (tenant_id, phone_number) garante index hit; verificado em pg_indexes"
    residual_risk: "Baixo — ganho operacional > risco residual"

  test_design_verification:
    verdict: PASS
    covered_by_tests:
      - "Acquire fresh (primeira sessão do phone) — test 1+2"
      - "Acquire sobre lock vivo (23505 → false) — test 3"
      - "Acquire sobre lock órfão (cleanup atua → INSERT sucede) — test 1 (mockLt resolve null = simula cleanup ok)"
      - "DB error não-conflict throws — test 4"
      - "TTL derivation correta — test 5"
    not_covered_by_test_but_acceptable:
      - "Race entre 2 acquires concorrentes — Vitest single-threaded; precisaria integration test (gap aceito pra story S)"
      - "DELETE falha mas INSERT sucede — caso edge sem validação explícita; comportamento de fallback é seguro (lock vivo continua bloqueando)"
      - "Performance benchmarking — não medido formalmente (overhead trivial inferido de PK index hit)"
    veredito: "Test design adequado pra story S; gaps são edge cases de baixa probabilidade aceitos"

  trace_given_when_then:
    verdict: PASS
    AC1:
      given: "Lock órfão existe em zenya_session_lock há > STALE_LOCK_AGE_MS"
      when: "acquireLock(tenantId, phone) chamado"
