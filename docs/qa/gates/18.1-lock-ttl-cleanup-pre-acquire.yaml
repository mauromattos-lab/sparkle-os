      when: "acquireLock chamado"
      then: "DELETE WHERE usa threshold = NOW - 10min (não 5min default)"
    AC4:
      given: "Processo crashou mid-execução, lock órfão persistiu"
      when: "Próximo webhook chama acquireLock"
      then: "Cleanup auto + INSERT sucede; sessão recuperada sem intervenção manual"
    AC5:
