    rationale: |
      Desvio justificado pelo perfil do tenant (volume baixo, cliente
      engajado, dono do negócio). Documentado na story 16.4 com
      proposta de adicionar "Variante para tenant de baixo volume" no
      playbook via Epic 15 v2 (rotear via story 17.Z).
    action: |
      Epic 17 story 17.Z (retroalimentar Epic 15 v2) deve incluir
      essa variante. Até lá, Epic 16 encerra com observação registrada
      e não deve virar precedente para Ensinaja, Doceria ou HL Importados.

  - id: 16-4-02
    severity: low
    category: testing
    description: |
      Fix #1 (aviso ao cliente antes de escalar), que era concern aberto
      em 16.3, não foi validado com smoke em produção real dentro de
      16.4 — foi **transferido para monitoramento contínuo**. Critério
      de validação: se em 30 dias não aparecer queixa da Julia sobre
      escalação sem aviso, considera-se validado implicitamente.
      Critério de reabertura: Julia relatar caso específico onde bot
      escalou sem avisar antes.
    action: |
      Monitorar. Se 30 dias (2026-05-22) passarem sem reclamação,
      concern 16-3-01 fecha automaticamente. Se aparecer caso,
      reabre como story 17.X (sob Epic 17).

