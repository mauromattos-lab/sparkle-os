concerns:
  - id: tech-debt-001
    severity: low
    category: tests
    description: |
      Seeds de tenant não têm testes unitários. Se um prompt futuro
      usar caracteres especiais que gray-matter interprete como YAML
      (ex: ':' no início de linha fora de quote), pode haver parse
      error silencioso. Considerar teste que valide matter(raw).content
      contra um snapshot por tenant.
    recommendation: |
      Criar test file packages/zenya/src/__tests__/tenant-prompts.test.ts
      na story zenya-prompts-04-governance que:
      1. Carrega cada docs/zenya/tenants/{slug}/prompt.md
      2. Valida que matter() não lança erro
      3. Valida que content tem tamanho > N chars
      4. Valida que front-matter tem campos obrigatórios (tenant,
         version, updated_at)

