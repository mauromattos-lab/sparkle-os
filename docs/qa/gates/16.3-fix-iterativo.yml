summary: |
  Gate RETROATIVO. 3 iterações de prompt aplicadas na Julia (v2, v3, v4)
  com seed idempotente em cada. md5 rastreável. Feedback da cliente final
  (Julia) incorporado 2x durante a execução — padrão "client em loop"
  respeitado. Fix #2 (não substituir produto fora de categoria)
  CRISTALINAMENTE confirmado no smoke de regressão (F6 v1 vendia taça
  gin quando cliente pedia champagne; v2+ escala sem substituir).
  Concern residual: Fix #1 não validado visualmente em REPL (tool fake
  mascara texto — validação visual definitiva depende de Story 16.4).

