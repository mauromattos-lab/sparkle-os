concerns:
  - id: 16-3-01
    severity: medium
    category: testing
    description: |
      Fix #1 (aviso ao cliente no MESMO turno de escalarHumano) não foi
      validado VISUALMENTE em REPL — porque o REPL cria conversationId
      fake, a tool escalarHumano falha com 404 antes de entregar texto.
      O que foi validado: o agente DECIDE corretamente invocar a tool
      (log mostra tool call). O que falta: confirmar que o texto de
      aviso SAI pro cliente quando a tool completa com sucesso em prod real.
    recommendation: |
      Story 16.4 valida em produção real. Quando Mauro mandar "Meu CEP
      é X" pelo WhatsApp da Prime (ou Julia com whitelist) e receber
      resposta de aviso + agente-off → Fix #1 confirmado. Se não chegar,
      voltamos pra iteração (talvez maxSteps não permitiu texto antes
      da tool, talvez precisa toolChoice forçado).

  - id: 16-3-02
    severity: low
    category: observability
    description: |
      v4 adicionou lógica de horário comercial via PROMPT, não via
      código. LLM precisa ler timestamp injetado no prompt + decidir se
      está dentro/fora do horário. Risco baixo mas existente: LLM pode
      errar a aritmética de horário em casos de borda (domingo 23:59,
      feriado não previsto, etc).
    recommendation: |
      Monitorar na Story 16.4 se aparecem casos onde bot avisou horário
      errado. Se frequente, considerar mover decisão pra código (helper
      no agent que injeta flag "is_business_hours" no prompt).

