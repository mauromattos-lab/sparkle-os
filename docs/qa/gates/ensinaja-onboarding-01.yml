decision: |
  ✅ PASS with concerns — story ensinaja-onboarding-01 aprovada pra
  handoff ao @devops. Cutover NÃO autorizado ainda — requer:
  1. Douglas enviar instruções de condução do atendimento
  2. @pm/@dev editam prompt.md → v2.1 com critério binário de escalação
     (incorporando diretriz Mauro "não enrolar")
  3. Re-rodar smoke — EN2 deve passar 100%
  4. Mauro executar CUTOVER-RUNBOOK com atenção ao passo 6 (desativar
     n8n ANTES do webhook)

  Gate QA finaliza Fase 3 (InReview). Story permanece InReview até
  cutover real acontecer. Gate pós-cutover (96h monitoring) é que
  move pra Done.

