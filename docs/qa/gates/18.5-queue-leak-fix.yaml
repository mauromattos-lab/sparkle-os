checks:
  - name: code_review
    severity: low
    verdict: PASS
    notes: |
      Patterns idiomáticos e consistentes com o resto do codebase:
      - try/finally externo correto: pendingIds declarado FORA do try; catch best-effort
        com markAllFailed(pendingIds).catch(() => {}) seguido de re-throw — pattern padrão
        de cleanup-then-rethrow.
      - Helper checkRaceAfterMarkDone extraído com escopo focado, comentário JSDoc claro,
        decisão deliberada documentada (sem reentrancy/recursion) — boa engenharia.
      - Fix 1: tenantConfig carregado pré-enqueue é REUSADO dentro do callback (linha 303
        const config = tenantConfig). Comentário explícito evita 2 lookups e clarifica
        a decisão pra próximo dev — escopo cirúrgico bem feito.
      - Fix 2: comentário "test-mode skip = sucesso silencioso (não falha)" deixa a
        decisão semântica óbvia no código (não só na story).
      - Naming consistente (checkRaceAfterMarkDone, pendingIds, mergedMessage).
      - Logs estruturados com tenant/conv/account contexto para debugging.
      Sem code smells. Sem dead code. Comentários "Story 18.5 / Fix N" facilitam
      arqueologia futura.

  - name: unit_tests
    severity: low
    verdict: PASS
    notes: |
      5 cenários AC 6 cobertos no describe "Story 18.5 queue leak fixes":
      - Cenário 1 (Fix 1): tenant inexistente → 400, enqueue NÃO chamado, pipeline async
        NÃO entrou em withSessionLock — assert tripla cobre defense-in-depth.
      - Cenário 2 (Fix 2): test-mode skip chama markAllDone(['m1']) e NÃO markAllFailed —
        distinção semântica done/failed validada.
      - Cenário 3 (Fix 3): Whisper rejeita; envelope externo capta exceção que escapa
        de transcribeAudioUrl (path sem try/catch interno antigo) e marca failed.
        Verifica que withSessionLock foi chamado (lock release garantido).
      - Cenário 4 (Fix 3): Chatwoot 5xx via runZenyaAgent rejeita; markAllFailed marcado
        com IDs corretos.
      - Cenário 5 (Fix 4): burst 5 msgs → 1 ciclo único, mensagem mergeada com \n,
        markAllDone com TODOS 5 ids, fetchPending chamado 2x (debounce + race-check).

      mockWithSessionLock.mockImplementation no beforeEach do describe novo executa
      o callback real — diferenciação correta dos legacy tests (que stubavam).
      Decisão vi.hoisted para ZENYA_DEBOUNCE_MS=1 documentada no arquivo de teste
      (linha 4-8) — explica por que precisa de hoisted (module scope capture).

  - name: acceptance_criteria
    severity: low
    verdict: PASS
    notes: |
      AC 1-6 todos cobertos por código + tests:
      - AC 1 (Fix 1): webhook.ts L218-230 — loadTenantByAccountId pré-enqueue, 400 unknown_tenant
        com accountId no body. Cenário 1 valida.
      - AC 2 (Fix 2): webhook.ts L350-356 — markAllDone(pendingIds) antes do return no
