      AC 7-8: WAIVED (gates de prod fora do escopo do QA gate técnico).

  - name: no_regressions
    severity: low
    verdict: PASS
    notes: |
      Tests legados (122 anteriores + 5 novos = 127 atualmente; antes do PO/Dev tinham
      122 tests, agora 127) continuam passando.

      Risco residual identificado pelo Dev no handoff: "mockWithSessionLock no top-level
      retorna {locked:true} sem rodar callback (compatibilidade com testes legados).
      Story 18.5 sobrescrevem com mockImplementation no beforeEach". Verificado:
      legacy tests (handleResetCommand, etc.) continuam funcionando porque o mock
      base preservou semântica antiga; apenas o describe novo override no beforeEach
      local. Pattern correto — sem cross-contamination de mocks.

      Outros 14 test files sem alteração (admin-agent, tool-factory, google-calendar,
      crypto, elevenlabs, config-loader, etc.) — todos PASS.

      tsc --noEmit PASS — type contracts preservados.

  - name: performance
    severity: low
    verdict: PASS
    notes: |
      Re-fetch após markAllDone (Fix 4): adiciona ~1 round-trip Supabase por turn.
      Análise de impacto:
      - Debounce já é 2.5s (DEBOUNCE_MS); ~50ms adicional do re-fetch é <2% do tempo total.
      - re-fetch usa best-effort try/catch (linha 130-143) — falha de DB não interrompe.
      - Frequência: apenas após markAllDone (sucesso); não em paths de erro.
      - Aceitável para o ganho de race detection (4% do leak histórico).

      Fix 1 (tenant lookup pré-enqueue): tenantConfig REUSADO no callback evita 2º lookup
      (decisão técnica explícita do Dev). Latência adicional zero — só move trabalho que
      já era feito. Cache hit em tenant config já existe no codebase.

      Cleanup script: usa Management API (não conexão direta). UPDATE com WHERE indexed
      (status='pending' tem index conforme schema). Operação one-shot, não impacta runtime.

  - name: security
    severity: low
    verdict: PASS
    notes: |
      Fix 1 — return 400 com {error: 'unknown_tenant', accountId} no body:
      - accountId vem do payload Chatwoot (não é segredo — é ID público em URLs Chatwoot).
      - error genérico, não revela arquitetura interna (não diz "Supabase 400" ou stack trace).
      - Logs (console.warn) ficam no servidor — não vazados pro cliente.
      - Não vaza segredos.

      Cleanup script SQL safety:
      - Usa Management API autenticada (SUPABASE_PAT validado em env REQUIRED check L30-36).
      - SQL é STATIC — única interpolação é STALE_THRESHOLD_HOURS (parseInt forçado em L39).
        Não há input do user no SQL. Defesa contra injection em depth: parseInt + escope
        WHERE bem definido (status='pending' AND created_at < NOW() - INTERVAL).
      - WHERE clause precisa de status='pending' E created_at antigo — não pode acidentalmente
        marcar mensagens recentes válidas. Conservadorismo de 24h aceitável.
      - --dry-run suportado — preview obrigatório antes do UPDATE real.
      - Idempotente: UPDATE só pega pending; rodar 2x não bagunça nada.
      - RETURNING permite auditoria pós-execução.

      Sem credenciais hardcoded. Sem SQL string concatenation com input variável.

