    severity: low
    verdict: PASS
    notes: |
      8/8 ACs atendidos:
      - AC 1 (guarda antes de escalateToHuman em conversa sem incoming prévio): ✅
        webhook.ts:212-227, guarda inline na entrada do bloco isHumanReply.
      - AC 2 (skip + reason no response): ✅ retorna
