    reason: |
      Step 4 do pattern operacional canônico do Epic 18 (6 steps) — smoke
      produção real só pode rodar após @devops Gage fazer push + deploy VPS.
      Cobertura unit dos 4 cenários AC 7 + edge case messages_count undefined
      é suficiente para gate técnico. Smoke real validará comportamento
      end-to-end pós-merge.
    severity: medium
    follow_up: |
      @devops Gage:
      1. Push da branch feat/18.23-anti-eco-saudacao-wa-business
      2. PR + squash-merge em main
      3. SSH VPS → git pull → npm install → npm run build → pm2 reload zenya-webhook
      4. Smoke: simular fluxo (mensagem dummy via Chatwoot UI da Scar pra inbox vazia
         sem incoming) e verificar `pm2 logs zenya-webhook | grep outgoing_before_first_incoming`
         que skip dispara
      5. Aguardar próximo lead REAL de Click-to-WA ad (Scar OU qualquer tenant)
         e confirmar bot responde
      6. Monitor 48h sem regressão antes do sign-off Mauro

  - check: monitor_48h_sem_regressao
    reason: |
      Step 5 do pattern Epic 18 — gate temporal pós-cleanup/deploy.
      Não pode ser exercitado pré-merge. Métricas a observar:
      - Logs zenya-webhook: contagem de skips outgoing_before_first_incoming
        (esperado 1+ por novo lead Click-to-WA, 0 antes do fix)
      - Conversas Chatwoot novas com label agente-off aplicada antes do
        primeiro incoming → deve ZERAR pra novos leads
      - Bot responde ≤15s pra primeiro incoming após saudação automática
    severity: low
    follow_up: |
      @devops monitora 48h e reporta. Se métricas estiverem fora do envelope,
      retorna pra @dev Dex investigar.

