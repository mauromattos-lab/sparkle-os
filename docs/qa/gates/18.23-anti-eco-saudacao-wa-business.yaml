        `body.conversation?.messages_count === 1` em produção.
      - AC 4 (regra original preservada — outgoing com incoming prévio): ✅
        Cenário 2 do teste valida.
      - AC 5 (bot reply ignora — sent_by_zenya=true): ✅ Cenário 3 valida.
      - AC 6 (log claro): ✅ formato `[zenya] outgoing_before_first_incoming — conv=… account=… messages_count=…`
      - AC 7 (4 cenários smoke): ✅ todos cobertos por testes unit.
      - AC 8 (sem regressão): ✅ 132/132 verde.

  - name: regression
    severity: low
    verdict: PASS
    notes: |
      Suíte total Zenya: 132/132 verde (15 test files). Zero falhas.
      webhook.test.ts especificamente: 30/30 (25 legados de Stories 18.1-18.5
