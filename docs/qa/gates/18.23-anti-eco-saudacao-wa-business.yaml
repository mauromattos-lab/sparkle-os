checks:
  - name: code_review
    severity: low
    verdict: PASS
    notes: |
      Padrão idiomático e consistente com o resto do webhook handler:
      - Guard inline antes do escalateToHuman (early return). Coerente com pattern
        existente "outgoing skip silent" (bot reply) e "incoming agente-off skip"
        já presentes no mesmo arquivo.
      - Variáveis bem nomeadas: messagesCount (snake → camel coerção do payload),
        isOutgoingBeforeFirstIncoming (boolean explícito, autodocumentado).
      - Comentário 10 linhas (linhas 203-212) explica o WHY: saudação automática
        WA Business + Click-to-WhatsApp ad. Cita o workflow n8n legado
        (docs/zenya/raw/wf_4BadjudZ6rww1AGk.json) como evidência da decisão A pura.
        Rastreabilidade futura excelente.
      - Tipo ChatwootWebhookPayload.conversation extendido com JSDoc citando
        "Story 18.23" — facilita arqueologia.
      - Log estruturado: `[zenya] outgoing_before_first_incoming — conv=... account=... messages_count=...`
        Inclui IDs já sanitizados (String() upstream) e o sinal usado.
      - Decisão deliberada de NÃO extrair helper função: 8 linhas de lógica linear
        sem ganho de legibilidade com indireção. Documentado no Dev Agent Record.
      - Comportamento da regra antiga preservado linha-a-linha — bloco original
        `if (isHumanReply && !labels.includes('agente-off')) { escalate }` intacto,
        guarda nova é insertion antes, não modificação.
      Sem code smells. Sem dead code. Sem complexidade ciclomática elevada.

  - name: unit_tests
    severity: low
    verdict: PASS
    notes: |
      5 testes novos no sub-describe "outgoing before first incoming (Story 18.23)":
      - Cenário 1 (NOVO/bug fix): saudação automática outgoing + messages_count=1
        → assert response { reason: 'outgoing_before_first_incoming' }, escalateToHuman
        NÃO chamado.
      - Cenário 2 (regra preservada): outgoing humano-painel + messages_count=3
        → human_reply=true, escalateToHuman chamado com source='human-reply'.
      - Cenário 3 (regra preservada): bot reply (sent_by_zenya=true) + messages_count=1
        → ignora silent, NÃO dispara guard nem escalate. Confirma que guarda só
        atua em isHumanReply=true.
      - Cenário 4 (NOVO/confirma fix): incoming após saudação prévia (messages_count=2)
        → enqueue chamado, escalateToHuman não. Bot processa lead normalmente.
      - Edge case: messages_count undefined (Chatwoot legado hipotético) → fallback
        regra antiga (aplica agente-off). Documenta a limitação consciente
        da Opção A pura.

      Mocks reusam o pattern existente do arquivo (mockEnqueue, mockEscalateToHuman).
      Asserções específicas (toHaveBeenCalledWith expect.objectContaining) verificam
      shape exato dos calls, não só count.

