  - docs/zenya/tenants/scar-ai/prompt.md  # v3 → v4
  - packages/zenya/scripts/smoke-scar.mjs  # +D7b, redesenho D6/D7
  - docs/stories/scar-payment-links-01/README.md  # NOVA story formalização retroativa
