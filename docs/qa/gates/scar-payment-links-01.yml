summary: |
  Story scar-payment-links-01 entrega prompt v4 com 3 mudanças cirúrgicas:
  (1) Regra Crítica §1 reescrita com fluxo dual BR/US — cliente BR fecha
  via link Cakto direto pela Scar, cliente US escala pro Gustavo;
  (2) Descontos REMOVIDOS por enquanto (Pix 7% + 5% off) — Mauro decide
  depois nova policy; (3) Adicionada seção "Links de Pagamento (BR)" com
  os 6 links Cakto (3 packs × 2 opções de pagamento). Smoke estendido
  com D6 redesenhado (sem 5%), D7 redesenhado (link OU pergunta opção),
  e D7b NOVO (fechamento US deve escalar sem link). Build PASS + 104/104
  testes pass (zero regressão).

  Verdict PASS with observations porque (a) smoke local não rodou (mesmo
  gap D2 da 17.2), (b) edge case onde Regra §1 e Regra §6 podem conflitar
  se cliente já passar a opção de pagamento no input inicial, (c) modo
  exploratório justificado mas deve ser exceção, não rotina.

checks:
  - id: code-review
    result: PASS
    notes: |
      Prompt v4 — mudanças cirúrgicas, padrão PLAKA + Scar v3:
      - Front-matter (version 4, sources +1, notes com 3 mudanças explícitas): ✅
      - Catálogo pacotes: 6 substituições consistentes ("10x R$ X" → "(Pix ou cartão até 12x via Cakto — ver Links de Pagamento)"). Preços base preservados.
      - Formas de pagamento: reescrita coerente com separação clara BR (Cakto via Scar) / US (manual via Gustavo).
      - Seção NOVA "Links de Pagamento (BR)" — tabela 3×2 visual + Regra de Uso 3 passos numerados. Headers explícitos minimizam risco de LLM embaralhar.
      - Regra Crítica §1 reescrita com fluxo dual: BR (4 sub-passos) + US (2 sub-passos) + clarificação universal sobre "NÃO enviar chave Pix, dados bancários". Tom imperativo. Exemplos literais entre aspas.
      - Regra Crítica §3 reescrita: "Sem desconto automático" + "Nunca prometa percentual" — defesa explícita.
      - Regra Crítica §5: 2 itens novos cobrindo o novo fluxo (BR pós-link + US ao aceitar).
      - Objeção "Faz mais barato?" reescrita: 2 caminhos (avulsas OU escalar) + "Nunca prometa 5% pra fechar".

      Preservou intactos (verificado via diff completo): Tom de voz, Idioma + Consistência (v2),
      Camadas Qualificação 1-4 (v3), Catálogo avulsas, Prazos, Objeções §1/§3/§4,
      Regras Críticas §2/§4/§6/§7/§8, Postura. ✅

      Smoke v4 — extensão e redesenho:
      - D6 (PedidoDesconto): pass_if redesenhado — checa noFivePercent + noSevenPercent + (offeredAvulsas OR escalated). Defesa contra regressão de 5%/7%.
      - D7 renomeado D7_Fechamento_BR_CRITICO: pass_if checa !leakedPix + (askedOption OR (linkSent + escalated)). Regex de link valida contra os 6 IDs Cakto específicos — proteção contra link inventado.
      - D7b NOVO: input em inglês, pass_if checa !linkLeaked + escalated + noPortuguese. Cobre fluxo dual.
      - Bug latente já fixado em D7 na story 17.2 (c.toolName → fallback) — preservado.

  - id: unit-tests
    result: PASS
    notes: |
      `npm test` — 104/104 testes passando em 13 test files (3.31s). Zero
      regressão. Mudanças concentradas em arquivo de prompt (markdown) e
      script de smoke (.mjs) — fora do escopo de testes vitest TS.

  - id: acceptance-criteria
    result: PASS
    notes: |
      AC1 (front-matter v4 + changelog): ✅ confirmado linhas 1-44 do prompt.md
      AC2 (Seção Links de Pagamento + tabela): ✅ linhas 200-216 — tabela 3×2 + regra de uso 3 passos
      AC3 (Regra §1 fluxo dual BR/US): ✅ linhas 234-251 — fluxo completo + clarificação universal
      AC4 (Regra §3 sem desconto): ✅ linha 254 com "Nunca prometa percentual"
      AC5 (Catálogo sem "10x", com Cakto): ✅ 6 linhas alteradas consistentes (3 packs × BR/US)
      AC6 (Formas de pagamento reescrita): ✅ linhas 184-198 — separação BR/US
      AC7 (Objeção "Faz mais barato?" sem 5%): ✅ linhas 217-222 — 2 caminhos
      AC8 (Smoke D6/D7/D7b): ✅ diff confirma os 3 cenários redesenhados/novos
      AC9 (Zero regressão build + tests): ✅ Dev confirmou
      AC10 (Não tocar seções v2/v3): ✅ diff confirma intactos — verificado integralmente

  - id: no-regressions
    result: PASS
    notes: |
      Verificação tripla:
      1. Diff completo do prompt.md mostra que TODAS as seções v3 que NÃO
         deveriam ser tocadas (Idioma + Consistência, Camadas Qualificação,
         Regras §2/§4/§6/§7/§8, Postura, Catálogo avulsas, Prazos, Objeções
         §1/§3/§4) ficaram literalmente intactas.
      2. 104 testes vitest passando — engine Zenya não foi alterada.
      3. Smoke D1, D2, D5, D5b, D9 — `pass_if` desses cenários permaneceu
         literal igual à v3. Lógica preservada.

      Smoke produção será rodado pelo @devops na VPS pós-deploy. Se algum
      cenário falhar, rollback é trivial (re-seed v3 já idempotente, md5
      banco volta pra 3456bfa91733b4ede2f1fdea2dae509f conhecido).

  - id: performance
    result: PASS
    notes: |
      Prompt v4 cresceu ~54 linhas vs v3 (293 vs 239 linhas, +23%). Em
      tokens reais isso é margem de ~+10-15% no system_prompt. Custo
      marginal aceitável dado o ganho de capacidade (fechamento direto).
      Sem mudanças de código, query, round-trips.

      Recomendação operacional: monitorar custo OpenAI na primeira semana
      de uso pra confirmar margem aceitável. Mas não é blocker.

  - id: security
    result: PASS
    notes: |
      Mudanças de superfície de segurança são MELHORIAS:
      - Regra §1 explicitamente proíbe enviar "chave Pix, dados bancários,
        ou qualquer info de pagamento que não esteja no link Cakto" — defesa
        nova contra LLM compensar com Pix manual quando deveria mandar link.
      - Regra §3 "Nunca prometa percentual de desconto" — defesa contra
        regressão pra v3 (5% off).
      - Smoke D6 verifica programaticamente noFivePercent + noSevenPercent
        — gate automático contra regressão.
      - Smoke D7 verifica !leakedPix com regex específica contra termos
        de pagamento manual ("chave pix", "minha pix", etc.).
      - Smoke D7b verifica !linkLeaked em inglês — proteção contra mandar
        link Cakto pra cliente US (link cobra em BRL, link inválido, ou
        confunde cliente que esperaria PayPal/Higlobe).

      Nenhum aspecto de segurança regrediu. Vários melhoraram.

  - id: documentation
    result: PASS
    notes: |
      - Story scar-payment-links-01/README.md com Dev Agent Record completo
        (Tasks/Subtasks executados, Debug Log, File List, Completion Notes,
        Change Log, Histórico).
      - Front-matter v4 do prompt documenta o changelog explicitamente
        (linhas 30-44).
      - Comentários inline no smoke explicam cada cenário novo (D6 linha
        119; D7 linha 142; D7b linha 168) com referência cruzada à v4.
      - 6 URLs Cakto preservadas literais no prompt e na regex do smoke
        (proteção contra typo/drift).

observations:
  - id: scar-payment-links-01-01
    severity: low
    category: testing
    description: |
      Smoke local não foi executado pelo @dev. Mesma causa da story 17.2:
      `.env` local aponta pra Supabase legado bloqueado. Já catalogado
      como dívida D2 no briefing brownfield Aria.

      Não-bloqueante porque:
      1. Mudanças do prompt v4 são incrementos cirúrgicos sobre v3 que
         já foi smoke-validada na produção (6/7 PASS, com D7 sendo falha
         REPL aceitável).
      2. Smoke produção é obrigatório pelo @devops no Step 8 do execution
         plan (mesmo padrão da 17.2).
    rationale: |
      Smoke real será rodado na VPS pelo @devops pós-deploy. Se algum
      cenário falhar, rollback é trivial (re-seed v3 já no banco, md5
      conhecido).
    action: |
      Pré-deploy:
      - @devops pull main + build + seed --dry-run pra confirmar md5 v4
        diferente do banco antes de aplicar.

      Pós-deploy (obrigatório):
      - @devops roda smoke produção. Esperado: 8/8 PASS (D1, D2, D5, D5b,
        D6, D7, D7b, D9). Aceita falha REPL em D7/D7b apenas se for
        addLabel/sendMessage 404 do Chatwoot (tool foi invocada
        corretamente, side-effect com conversationId fake — comportamento
        já documentado e aceito na 17.2).

  - id: scar-payment-links-01-02
    severity: low
    category: prompt-design
    description: |
      Edge case potencial entre Regra Crítica §1 (preservada) e Regra
      Crítica §6 (releia histórico).

      Regra §1 BR diz: "Cliente confirmou o pacote → pergunte: 'Você
      prefere pagar o valor completo ou usar a opção de 50% agora + 50%
      na entrega?'"

      Regra §6 (preservada do v3) diz: "Sempre releia o histórico antes
      de perguntar. Se a informação já foi dada pelo cliente em mensagem
      anterior, NÃO REPITA — use-a como gancho."

      Edge case: se cliente disser de cara *"Quero o Premium e vou pagar
      à vista"*, a Regra §1 instrui a perguntar "completo ou 50/50?" mas
      a Regra §6 instrui a NÃO perguntar (info já dada). Pode haver
      pergunta redundante.
    rationale: |
      Severidade low porque:
      1. É edge case raro — cliente típico não declara opção de pagamento
         antes de saber que existem 2 opções.
      2. Regra §6 deveria sobrescrever §1 em LLM treinado (Regra §6 é mais
         genérica e tem tom imperativo forte com "NÃO REPITA").
      3. Smoke D7 (atual) testa input neutro "Como faço pra pagar?" — não
         expõe esse edge case.

      Não é regressão — não pioria. Mas é refinamento desejável em v5.
    action: |
      Backlog: em uma futura iteração v5, a Regra §1 BR poderia explicitar:
        "Se o cliente já indicou no histórico a forma de pagamento desejada
        (ex: 'quero pagar à vista', 'prefiro parcelar'), NÃO repita a
        pergunta — vá direto pro link correspondente. Veja Regra §6."

      Não bloqueia esta story. Documentar como concern resolvido em v5.

  - id: scar-payment-links-01-03
    severity: low
    category: process
    description: |
      Story foi implementada em **modo exploratório com formalização
      retroativa** (memória `feedback_exploratory_then_retroactive_aiox.md`).
      Não passou pelo SDC formal (sm draft → po validate → dev develop).

      Justificativa documentada na story: cliente real (Gustavo) está em
      loop de teste, decisão de Mauro veio durante a sessão, processo
      formal completo custaria latência inaceitável.
    rationale: |
      Memória `feedback_exploratory_then_retroactive_aiox.md` autoriza
      explicitamente esse padrão pra brownfield com cliente no loop.
      Memória `feedback_process_integrity.md` exige formalização
      retroativa — feita (story criada com todos os campos).

      Trilha de auditoria completa: README + handoff dev→qa formal +
      gate file (este) + commit explícito (a fazer pelo @devops).

      Não é violação. É exceção autorizada.
    action: |
      Documentar: este padrão deve ser **exceção, não rotina**. Critério
      pra exceção: cliente real em loop + decisão urgente do dono +
      mudança cirúrgica baixo risco. As três condições foram atendidas
      aqui (Gustavo + Mauro durante sessão + mudança em prompt sem código).

      Próximas iterações de prompt da Scar voltarão ao SDC formal
      (sm draft → po validate → dev develop) — Gustavo já validou o
      conceito v3 + v4, próxima v5 não tem urgência justificada.

